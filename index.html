<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Human Learning</title>
    <meta name="description" content="Human Learning - sito in riallestimento.">
    <style>
      :root {
        color-scheme: dark;
        --ink: #f7f8f8;
        --muted: #d6dcdf;
        --line: rgba(255, 255, 255, 0.35);
        --accent: #c9f2df;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0d1114;
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.5;
        overflow: hidden;
      }

      .video-bg {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.82;
      }

      .shade {
        position: fixed;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(5, 8, 10, 0.84), rgba(5, 8, 10, 0.45) 54%, rgba(5, 8, 10, 0.18)),
          linear-gradient(0deg, rgba(5, 8, 10, 0.70), rgba(5, 8, 10, 0.05) 48%, rgba(5, 8, 10, 0.35));
      }

      main {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        align-items: flex-end;
        width: min(980px, calc(100% - 36px));
        margin: 0 auto;
        padding: 42px 0;
      }

      .brand {
        max-width: 760px;
        padding: 0 0 22px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 1;
        font-weight: 700;
        letter-spacing: 0;
        text-shadow: 0 3px 18px rgba(0, 0, 0, 0.55);
      }

      p {
        margin: 0;
        max-width: 58ch;
        font-size: 1.05rem;
        color: var(--muted);
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
      }

      .status {
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid var(--line);
        font-size: 0.95rem;
        color: var(--ink);
      }

      a {
        color: var(--accent);
      }

      @media (max-width: 680px) {
        main {
          width: min(100% - 28px, 980px);
          padding: 30px 0;
        }

        .shade {
          background:
            linear-gradient(0deg, rgba(5, 8, 10, 0.88), rgba(5, 8, 10, 0.28) 70%, rgba(5, 8, 10, 0.35));
        }
      }
    </style>
  </head>
  <body>
    <video class="video-bg" autoplay loop muted playsinline poster="">
      <source src="assets/2mega_2.mp4" type="video/mp4">
    </video>
    <div class="shade" aria-hidden="true"></div>
    <main>
      <section class="brand" aria-label="Human Learning">
        <h1>Human Learning</h1>
        <p>
          Il sito e' in riallestimento. I canali operativi restano attivi
          durante la migrazione tecnica.
        </p>
        <p class="status">
          Per comunicazioni: <a href="mailto:u.bonora@humanlearning.srl">u.bonora@humanlearning.srl</a>
        </p>
      </section>
    </main>
  </body>
</html>
